services:
  backend:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - KUZU_DB_DIR=/app/data/kuzu
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./data:/app/data
