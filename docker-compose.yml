services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/gitaai_dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./data:/app/data
    depends_on:
      - neo4j

volumes:
  neo4j_data:
